kind = "data-app"
previewPath = "/"
title = "MedAI Vision Dashboard"
version = "1.0.0"
id = "artifacts/medai-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24459

[services.development]
run = "pnpm --filter @workspace/medai-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medai-dashboard", "run", "build" ]
publicDir = "artifacts/medai-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24459"
BASE_PATH = "/"
